"day-body\">\n    <p>A few days back (Day 23), you wrote a CLAUDE.md — context about a <em>specific project<\u002Fem> that Claude reads when you open that folder. Today is different. You’re writing a <em>personal<\u002Fem> preferences document — about how <em>you<\u002Fem> work, not any single project. File naming, organization habits, what would freak you out if Claude did it without asking. You can hand it to Claude in any session and it’ll adapt.<\u002Fp>\n\n    <div class=\"codeblock\"><pre>cd ~/claude-lab\nclaude<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"codeblock\"><pre>I want to make a \"preferences\" document I can show you in future sessions. Ask me questions about how I like to work: file naming, where I save things, how I like writing organized, what makes me trust your suggestions, what would freak me out. Then write up a preferences.md based on my answers.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Claude is great at adapting to you, but only if you tell it how. Being explicit upfront saves friction later.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"26\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-27\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 27<\u002Fspan><h3 class=\"day-title\">Solve a Real Problem<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>Find something on your computer that isn’t quite working. A script that’s broken, a process that gives weird results, a file that won’t open right.<\u002Fp>\n\n    <div class=\"codeblock\"><pre>claude<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Work through it step by step:<\u002Fp>\n    <div class=\"codeblock\"><pre>Something's wrong: [describe]. Before fixing it, let's figure out together what's happening. What do you think is going on, and what should we check first?<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Debugging is just curiosity applied systematically. Don’t jump to fixes. Understand first.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"27\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-28\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 28<\u002Fspan><h3 class=\"day-title\">Try Something Ambitious<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>Pick something that feels just barely out of reach. Examples:<\u002Fp>\n    <ul>\n      <li>Make me a chart that shows how my [data] has changed over time.<\u002Fli>\n      <li>Build me a tiny website that lists all my projects.<\u002Fli>\n      <li>Take my notes from the last month and write a short essay summarizing what I’ve been thinking about.<\u002Fli>\n      <li>Connect this to my calendar somehow.<\u002Fli>\n    <\u002Ful>\n\n    <p>If Claude can’t do it, ask why and what alternatives exist.<\u002Fp>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      You won’t always succeed, but trying is how you find out what’s possible.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"28\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-29\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 29<\u002Fspan><h3 class=\"day-title\">Teach Someone<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>Write a short guide. One page. Explaining the most useful thing you’ve learned this month. Pretend you’re writing it for the friend you have who would benefit most.<\u002Fp>\n\n    <p>Save it in your lab folder.<\u002Fp>\n\n    <p>Bonus: actually send it to that friend.<\u002Fp>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Teaching forces you to understand. If you struggle to explain something, that’s where to study more.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"29\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-30\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 30<\u002Fspan><h3 class=\"day-title\">Look at the Map<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <div class=\"codeblock\"><pre>cd ~/claude-lab\nclaude<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"codeblock\"><pre>Take a tour of my whole claude-lab folder. Walk me through what we built, in roughly the order I built it. What did I learn? What got easier as I went?<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"codeblock\"><pre>Add a final section to reflections.md called \"After 30 Days.\" Help me write an honest assessment: what changed about how I use my computer, what still feels hard, and what I want to keep doing.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"codeblock\"><pre>Help me pick one habit I'll keep using Claude Code for, starting tomorrow.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      The program is over. Now you just… use it.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"30\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<!-- ═════════ AFTER ═════════ -->\n<section class=\"afterword\">\n  <h2>After the 30 Days<\u002Fh2>\n  <p>You’ve built:<\u002Fp>\n  <ul>\n    <li><strong>Comfort with the terminal.<\u002Fstrong> That window doesn’t scare you anymore.<\u002Fli>\n    <li><strong>A working relationship with Claude.<\u002Fstrong> You know how to ask for what you want.<\u002Fli>\n    <li><strong>Some tools that are actually yours.<\u002Fstrong> Small, useful, fit your life.<\u002Fli>\n    <li><strong>A reflex for noticing friction.<\u002Fstrong> You spot tasks Claude could help with.<\u002Fli>\n    <li><strong>Confidence to break things,<\u002Fstrong> because git has your back.<\u002Fli>\n  <\u002Ful>\n\n  <p>Where to go next, when you’re ready:<\u002Fp>\n  <ul>\n    <li>Try Claude Code inside an editor like VS Code (it has a built-in version).<\u002Fli>\n    <li>Learn about “MCP servers.” Ways to connect Claude to your email, calendar, or other apps.<\u002Fli>\n    <li>Build more ambitious tools as needs come up.<\u002Fli>\n    <li>Show a friend how to do this.<\u002Fli>\n  <\u002Ful>\n\n  <div class=\"cheat\" id=\"cheat-sheet\">\n    <h3>The bare minimum you need to remember<\u002Fh3>\n\n    <div class=\"cheat-section\">\n      <div class=\"cheat-section-label\">Getting around the terminal<\u002Fdiv>\n      <dl class=\"cmd-list\">\n        <dt>pwd<\u002Fdt><dd>Where am I?<\u002Fdd>\n        <dt>ls<\u002Fdt><dd>What’s here?<\u002Fdd>\n        <dt>cd foldername<\u002Fdt><dd>Go into that folder<\u002Fdd>\n        <dt>cd ..<\u002Fdt><dd>Go up one level<\u002Fdd>\n        <dt>cd ~<\u002Fdt><dd>Go to my home folder<\u002Fdd>\n        <dt>cd ~/Documents<\u002Fdt><dd>Jump to Documents<\u002Fdd>\n      <\u002Fdl>\n    <\u002Fdiv>\n\n    <div class=\"cheat-section\">\n      <div class=\"cheat-section-label\">Claude Code<\u002Fdiv>\n      <dl class=\"cmd-list\">\n        <dt>claude<\u002Fdt><dd>Start Claude<\u002Fdd>\n        <dt>/exit<\u002Fdt><dd>Quit Claude<\u002Fdd>\n        <dt>Ctrl + C<\u002Fdt><dd>Cancel whatever’s happening<\u002Fdd>\n        <dt>claude --version<\u002Fdt><dd>Check that Claude’s installed<\u002Fdd>\n      <\u002Fdl>\n    <\u002Fdiv>\n\n    <div class=\"cheat-section\">\n      <div class=\"cheat-section-label\">Things to say when you’re stuck<\u002Fdiv>\n      <dl class=\"cmd-list\">\n        <dt>“What does this error mean?”<\u002Fdt><dd><\u002Fdd>\n        <dt>“Is this safe to run?”<\u002Fdt><dd><\u002Fdd>\n        <dt>“Explain what you just did in simple terms.”<\u002Fdt><dd><\u002Fdd>\n        <dt>“Show me what’s in this folder.”<\u002Fdt><dd><\u002Fdd>\n        <dt>“What would happen if I [thing]?”<\u002Fdt><dd><\u002Fdd>\n        <dt>“Explain like I’m new to this.”<\u002Fdt><dd><\u002Fdd>\n      <\u002Fdl>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"weird\" id=\"troubleshoot\">\n    <h3>When things go weird<\u002Fh3>\n    <ul class=\"weird-list\">\n      <li>\n        <div class=\"weird-q\">The terminal is showing something that won’t stop.<\u002Fdiv>\n        <div class=\"weird-a\">Press Ctrl + C. That cancels.<\u002Fdiv>\n      <\u002Fli>\n      <li>\n        <div class=\"weird-q\">I typed something wrong and the terminal shows “&gt;”<\u002Fdiv>\n        <div class=\"weird-a\">You’re in the middle of an unfinished command. Press Ctrl + C to escape.<\u002Fdiv>\n      <\u002Fli>\n      <li>\n        <div class=\"weird-q\">Claude is doing something I didn’t expect.<\u002Fdiv>\n        <div class=\"weird-a\">Type “stop” or press Ctrl + C, then ask Claude to explain what it was doing.<\u002Fdiv>\n      <\u002Fli>\n      <li>\n        <div class=\"weird-q\">I deleted something important.<\u002Fdiv>\n        <div class=\"weird-a\">If you set up git (Day 19), you can probably get it back. Ask Claude.<\u002Fdiv>\n      <\u002Fli>\n      <li>\n        <div class=\"weird-q\">I accidentally exited Claude.<\u002Fdiv>\n        <div class=\"weird-a\">No problem. Just type <code class=\"inline\">claude<\u002Fcode> again and press Enter. You’re back.<\u002Fdiv>\n      <\u002Fli>\n      <li>\n        <div class=\"weird-q\">macOS is asking permission for Terminal to access a folder.<\u002Fdiv>\n        <div class=\"weird-a\">Click OK or Allow. That’s how macOS lets Claude read the folders you’ve asked it to look at. You can change this later in System Settings → Privacy &amp; Security if you want.<\u002Fdiv>\n      <\u002Fli>\n      <li>\n        <div class=\"weird-q\">A command says “permission denied.”<\u002Fdiv>\n        <div class=\"weird-a\">Don’t force it. Ask Claude what the message means before you do anything else.<\u002Fdiv>\n      <\u002Fli>\n      <li>\n        <div class=\"weird-q\">I’m overwhelmed.<\u002Fdiv>\n        <div class=\"weird-a\">Close the terminal. Come back tomorrow. The terminal is not going anywhere, and neither is Claude.<\u002Fdiv>\n      <\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n\n  <p class=\"closing\">You don’t need to remember commands. You need to remember that you can ask.<\u002Fp>\n<\u002Fsection>\n\n<\u002Fmain>\n\n<\u002Fdiv>\n\n<script>\n(function() {\n  const STORAGE_KEY = \"claude30-progress-v1\";\n  const TOTAL = 31; // days 0–30\n\n  function loadProgress() {\n    try {\n      const raw = localStorage.getItem(STORAGE_KEY);\n      return raw ? new Set(JSON.parse(raw)) : new Set();\n    } catch { return new Set(); }\n  }\n\n  function saveProgress(set) {\n    try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...set])); } catch {}\n  }\n\n  let done = loadProgress();\n\n  function render() {\n    document.querySelectorAll(\".nav-day[data-day]\").forEach(el => {\n      const d = el.dataset.day;\n      el.classList.toggle(\"done\", done.has(d));\n    });\n    document.querySelectorAll(\".complete-btn[data-day]\").forEach(el => {\n      const d = el.dataset.day;\n      const isDone = done.has(d);\n      el.classList.toggle(\"done\", isDone);\n      el.querySelector(\".label\").textContent = isDone ? \"Done\" : \"Mark complete\";\n    });\n    const count = done.size;\n    const pct = Math.round((count / TOTAL) * 100);\n    document.getElementById(\"pct\").textContent = count;\n    document.getElementById(\"progressFill\").style.width = pct + \"%\";\n  }\n\n  // Complete buttons\n  document.querySelectorAll(\".complete-btn[data-day]\").forEach(btn => {\n    btn.addEventListener(\"click\", () => {\n      const d = btn.dataset.day;\n      if (done.has(d)) done.delete(d); else done.add(d);\n      saveProgress(done);\n      render();\n    });\n  });\n\n  // Reset\n  document.getElementById(\"resetBtn\").addEventListener(\"click\", () => {\n    if (confirm(\"Reset all progress? This can't be undone.\")) {\n      done = new Set();\n      saveProgress(done);\n      render();\n    }\n  });\n\n  // Copy buttons\n  document.querySelectorAll(\".copy-btn\").forEach(btn => {\n    btn.textContent = \"Copy\";\n    btn.addEventListener(\"click\", async () => {\n      const pre = btn.parentElement.querySelector(\"pre\");\n      if (!pre) return;\n      try {\n        await navigator.clipboard.writeText(pre.textContent);\n        btn.textContent = \"Copied\";\n        btn.classList.add(\"copied\");\n        setTimeout(() => {\n          btn.textContent = \"Copy\";\n          btn.classList.remove(\"copied\");\n        }, 1400);\n      } catch {\n        btn.textContent = \"Press ⌘C\";\n        setTimeout(() => { btn.textContent = \"Copy\"; }, 1400);\n      }\n    });\n  });\n\n  // Scroll spy for sidebar\n  const sections = [...document.querySelectorAll(\"article.day, section.phase\")];\n  const navLinks = new Map();\n  document.querySelectorAll(\".nav-day[href]\").forEach(a => {\n    const id = a.getAttribute(\"href\").slice(1);\n    navLinks.set(id, a);\n  });\n\n  const observer = new IntersectionObserver(entries => {\n    entries.forEach(e => {\n      if (e.isIntersecting) {\n        navLinks.forEach(a => a.classList.remove(\"active\"));\n        const link = navLinks.get(e.target.id);\n        if (link) link.classList.add(\"active\");\n      }\n    });\n  }, { rootMargin: \"-30% 0px -60% 0px\", threshold: 0 });\n\n  sections.forEach(s => observer.observe(s));\n\n  render();\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
