document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

748b;     /* slate-600 */\n  --heading: #1e293b;       /* slate-900 — headings */\n  --accent: #ea580c;        /* orange — brand default, cycled per phase */\n  --accent-hover: #c2410c;\n  --accent-soft: #fed7aa;\n  --accent-faint: #ffedd5;\n  --line: #e2e8f0;          /* slate-300 */\n  --line-strong: #cbd5e1;   /* slate-400 */\n  --success: #16a34a;\n\n  --serif: \"Fraunces\", Georgia, serif;\n  --sans: \"Source Sans 3\", -apple-system, BlinkMacSystemFont, sans-serif;\n  --mono: \"JetBrains Mono\", \"SF Mono\", Menlo, ui-monospace, monospace;\n\n  --measure: 62ch;\n  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\nhtml {\n  scroll-behavior: smooth;\n  -webkit-text-size-adjust: 100%;\n}\n\nbody {\n  font-family: var(--serif);\n  font-feature-settings: \"ss01\", \"ss02\";\n  font-variation-settings: \"opsz\" 14, \"SOFT\" 40, \"WONK\" 0;\n  background: var(--bg);\n  color: var(--ink);\n  font-size: 18px;\n  line-height: 1.65;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n::selection { background: var(--accent-soft); color: var(--ink); }\n\n.shell {\n  display: grid;\n  grid-template-columns: 260px 1fr;\n  max-width: 1400px;\n  margin: 0 auto;\n  min-height: 100vh;\n}\n\n/* ───── Sidebar ───── */\naside.sidebar {\n  position: sticky;\n  top: 0;\n  height: 100vh;\n  overflow-y: auto;\n  padding: 2.5rem 1.5rem 3rem;\n  border-right: 1px solid var(--line);\n  background: oklch(0.955 0.013 72);\n  scrollbar-width: thin;\n  scrollbar-color: var(--line-strong) transparent;\n}\n\naside.sidebar::-webkit-scrollbar { width: 6px; }\naside.sidebar::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 3px; }\naside.sidebar::-webkit-scrollbar-track { background: transparent; }\n\n.brand {\n  font-variation-settings: \"opsz\" 60, \"SOFT\" 100, \"WONK\" 1;\n  font-size: 1.7rem;\n  line-height: 1.05;\n  font-weight: 500;\n  letter-spacing: -0.02em;\n  margin-bottom: 0.35rem;\n}\n\n.brand-sub {\n  font-size: 0.72rem;\n  color: var(--ink-muted);\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  font-family: var(--mono);\n  margin-bottom: 2.25rem;\n}\n\n.progress-meter {\n  margin-bottom: 2.5rem;\n}\n\n.progress-label {\n  font-size: 0.78rem;\n  color: var(--ink-soft);\n  display: flex;\n  justify-content: space-between;\n  align-items: baseline;\n  margin-bottom: 0.55rem;\n  font-variant-numeric: tabular-nums;\n  font-family: var(--mono);\n  letter-spacing: 0.04em;\n}\n\n.progress-label .pct { color: var(--accent); font-weight: 500; }\n\n.progress-bar {\n  height: 3px;\n  background: var(--line);\n  border-radius: 2px;\n  overflow: hidden;\n}\n\n.progress-fill {\n  height: 100%;\n  background: var(--accent);\n  width: 0%;\n  transition: width 700ms var(--ease-out);\n}\n\n.nav-phase {\n  margin-bottom: 1.75rem;\n}\n\n.nav-phase-title {\n  font-family: var(--mono);\n  font-size: 0.66rem;\n  text-transform: uppercase;\n  letter-spacing: 0.16em;\n  color: var(--ink-muted);\n  font-weight: 500;\n  margin-bottom: 0.7rem;\n  padding: 0 0.4rem;\n}\n\n.nav-day {\n  display: flex;\n  align-items: center;\n  gap: 0.7rem;\n  padding: 0.4rem 0.5rem;\n  text-decoration: none;\n  color: var(--ink-soft);\n  font-size: 0.92rem;\n  border-radius: 6px;\n  transition: background 180ms var(--ease-out), color 180ms var(--ease-out);\n  line-height: 1.3;\n}\n\n.nav-day:hover {\n  background: var(--bg);\n  color: var(--ink);\n}\n\n.nav-day.active {\n  background: var(--accent-faint);\n  color: var(--ink);\n}\n\n.day-dot {\n  width: 12px;\n  height: 12px;\n  border: 1.5px solid var(--line-strong);\n  border-radius: 50%;\n  flex-shrink: 0;\n  transition: all 220ms var(--ease-out);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  position: relative;\n}\n\n.nav-day.done .day-dot {\n  background: var(--accent);\n  border-color: var(--accent);\n}\n\n.nav-day.done .day-dot::after {\n  content: \"\";\n  position: absolute;\n  width: 5px;\n  height: 2.5px;\n  border-left: 1.5px solid var(--bg);\n  border-bottom: 1.5px solid var(--bg);\n  transform: rotate(-45deg) translate(0.5px, -0.5px);\n}\n\n.day-num {\n  font-family: var(--mono);\n  font-variant-numeric: tabular-nums;\n  font-size: 0.72rem;\n  color: var(--ink-muted);\n  width: 18px;\n  flex-shrink: 0;\n}\n\n.nav-day.active .day-num { color: var(--accent); }\n\n.reset-link {\n  display: block;\n  margin-top: 1.5rem;\n  font-size: 0.78rem;\n  color: var(--ink-muted);\n  background: none;\n  border: none;\n  cursor: pointer;\n  font-family: var(--serif);\n  text-align: left;\n  padding: 0.4rem;\n  font-style: italic;\n}\n\n.reset-link:hover { color: var(--accent); }\n\n/* ───── Main ───── */\nmain {\n  padding: 4.5rem 4rem 8rem;\n  max-width: 820px;\n}\n\n/* Intro */\n.intro {\n  margin-bottom: 4rem;\n}\n\nh1.title {\n  font-size: clamp(2.75rem, 6vw, 4.75rem);\n  font-variation-settings: \"opsz\" 96, \"SOFT\" 100, \"WONK\" 1;\n  line-height: 1.0;\n  letter-spacing: -0.03em;\n  font-weight: 400;\n  margin-bottom: 0.6rem;\n}\n\n.subtitle {\n  font-size: 1.3rem;\n  color: var(--ink-soft);\n  font-style: italic;\n  font-variation-settings: \"opsz\" 20, \"SOFT\" 80;\n  margin-bottom: 2.5rem;\n  max-width: var(--measure);\n}\n\n.intro-body p {\n  margin-bottom: 1.15rem;\n  max-width: var(--measure);\n}\n\n.intro-body strong { font-weight: 600; }\n\n.promise-list {\n  margin: 2.5rem 0;\n  list-style: none;\n  max-width: var(--measure);\n}\n\n.promise-list li {\n  padding: 1rem 0;\n  border-top: 1px solid var(--line);\n  display: grid;\n  grid-template-columns: 1.5rem 1fr;\n  gap: 0.5rem;\n  align-items: baseline;\n}\n\n.promise-list li:last-child { border-bottom: 1px solid var(--line); }\n\n.promise-list li::before {\n  content: \"→\";\n  color: var(--accent);\n  font-family: var(--mono);\n  font-weight: 500;\n}\n\n.time-note {\n  font-size: 0.95rem;\n  color: var(--ink-soft);\n  font-style: italic;\n  margin-top: 1rem;\n}\n\n/* Phase */\n.phase {\n  margin: 6rem 0 3rem;\n  padding-top: 2.5rem;\n  border-top: 1.5px solid var(--ink);\n  scroll-margin-top: 1.5rem;\n}\n\n.phase-num {\n  font-family: var(--mono);\n  font-size: 0.74rem;\n  text-transform: uppercase;\n  letter-spacing: 0.22em;\n  color: var(--accent);\n  font-weight: 500;\n  margin-bottom: 0.7rem;\n}\n\nh2.phase-title {\n  font-size: clamp(2rem, 4vw, 2.75rem);\n  font-variation-settings: \"opsz\" 48, \"SOFT\" 70, \"WONK\" 0;\n  line-height: 1.05;\n  letter-spacing: -0.025em;\n  font-weight: 400;\n  margin-bottom: 0.6rem;\n}\n\n.phase-sub {\n  font-size: 1.1rem;\n  color: var(--ink-soft);\n  font-style: italic;\n  margin-bottom: 1.75rem;\n  max-width: var(--measure);\n  font-variation-settings: \"opsz\" 18, \"SOFT\" 80;\n}\n\n.phase-intro {\n  max-width: var(--measure);\n  color: var(--ink-soft);\n  margin-bottom: 3.5rem;\n  font-size: 1.02rem;\n}\n\n/* Day */\n.day {\n  margin: 4.5rem 0;\n  scroll-margin-top: 1.5rem;\n}\n\n.day-header {\n  margin-bottom: 1.5rem;\n  display: flex;\n  align-items: baseline;\n  gap: 1.1rem;\n  flex-wrap: wrap;\n}\n\n.day-label {\n  font-family: var(--mono);\n  font-size: 0.74rem;\n  letter-spacing: 0.16em;\n  text-transform: uppercase;\n  color: var(--accent);\n  font-weight: 500;\n}\n\nh3.day-title {\n  font-size: 1.95rem;\n  font-variation-settings: \"opsz\" 32, \"SOFT\" 60;\n  font-weight: 400;\n  letter-spacing: -0.02em;\n  line-height: 1.15;\n}\n\n.day-body { max-width: var(--measure); }\n\n.day-body p { margin-bottom: 1.15rem; }\n\n.day-body ul, .day-body ol {\n  margin: 1rem 0 1.3rem 0;\n  padding-left: 1.6rem;\n}\n\n.day-body li { margin-bottom: 0.5rem; }\n\n.day-body li::marker { color: var(--ink-muted); }\n\n.day-body strong { font-weight: 600; }\n.day-body em { font-style: italic; color: var(--ink); }\n\n/* Code blocks */\n.codeblock {\n  position: relative;\n  margin: 1.3rem 0;\n  background: var(--bg-code);\n  border: 1px solid var(--line);\n  border-radius: 8px;\n  font-family: var(--mono);\n  font-size: 0.86rem;\n  line-height: 1.6;\n}\n\n.codeblock pre {\n  padding: 0.95rem 1.15rem;\n  overflow-x: auto;\n  white-space: pre;\n  color: var(--ink);\n}\n\n.copy-btn {\n  position: absolute;\n  top: 0.5rem;\n  right: 0.5rem;\n  background: var(--bg);\n  border: 1px solid var(--line);\n  color: var(--ink-soft);\n  font-family: var(--mono);\n  font-size: 0.66rem;\n  text-transform: uppercase;\n  letter-spacing: 0.1em;\n  padding: 0.32rem 0.6rem;\n  border-radius: 5px;\n  cursor: pointer;\n  opacity: 0;\n  transition: opacity 220ms var(--ease-out), color 200ms, border-color 200ms;\n}\n\n.codeblock:hover .copy-btn,\n.codeblock:focus-within .copy-btn { opacity: 1; }\n\n.copy-btn:hover {\n  color: var(--accent);\n  border-color: var(--accent);\n}\n\n.copy-btn.copied {\n  color: var(--success);\n  border-color: var(--success);\n  opacity: 1;\n}\n\n/* Inline code */\ncode.inline {\n  font-family: var(--mono);\n  font-size: 0.86em;\n  background: var(--bg-code);\n  padding: 0.12em 0.4em;\n  border-radius: 4px;\n  border: 1px solid var(--line);\n  color: var(--ink);\n  white-space: nowrap;\n}\n\n/* Learned */\n.learned {\n  margin: 1.75rem 0 0;\n  padding: 1.1rem 1.3rem;\n  background: var(--accent-faint);\n  border-radius: 8px;\n  font-size: 0.97rem;\n  max-width: var(--measure);\n}\n\n.learned-label {\n  font-size: 0.66rem;\n  text-transform: uppercase;\n  letter-spacing: 0.16em;\n  font-weight: 600;\n  color: var(--accent);\n  margin-bottom: 0.4rem;\n  font-family: var(--mono);\n}\n\n/* Mark-complete button */\n.complete-btn {\n  margin-top: 1.75rem;\n  background: transparent;\n  border: 1.5px solid var(--line-strong);\n  color: var(--ink-soft);\n  font-family: var(--serif);\n  font-size: 0.97rem;\n  padding: 0.55rem 1.2rem;\n  border-radius: 7px;\n  cursor: pointer;\n  display: inline-flex;\n  align-items: center;\n  gap: 0.55rem;\n  transition: all 220ms var(--ease-out);\n  font-variation-settings: \"opsz\" 16, \"SOFT\" 30;\n}\n\n.complete-btn:hover {\n  border-color: var(--accent);\n  color: var(--accent);\n}\n\n.complete-btn .check {\n  width: 14px;\n  height: 14px;\n  border-radius: 50%;\n  border: 1.5px solid currentColor;\n  display: inline-block;\n  position: relative;\n  transition: all 220ms var(--ease-out);\n}\n\n.complete-btn.done {\n  background: var(--accent);\n  border-color: var(--accent);\n  color: oklch(0.97 0.012 75);\n}\n\n.complete-btn.done .check { background: transparent; border-color: currentColor; }\n\n.complete-btn.done .check::after {\n  content: \"\";\n  position: absolute;\n  left: 50%;\n  top: 50%;\n  width: 5px;\n  height: 2.5px;\n  border-left: 1.5px solid currentColor;\n  border-bottom: 1.5px solid currentColor;\n  transform: translate(-50%, -65%) rotate(-45deg);\n}\n\n/* Callout */\n.callout {\n  margin: 1.3rem 0;\n  padding: 1rem 1.3rem;\n  border-left: 1px solid var(--line);\n  background: var(--bg-elevated);\n  border-radius: 0 8px 8px 0;\n  font-size: 0.96rem;\n}\n\n.callout-label {\n  font-size: 0.66rem;\n  text-transform: uppercase;\n  letter-spacing: 0.16em;\n  font-weight: 600;\n  font-family: var(--mono);\n  color: var(--ink-soft);\n  margin-bottom: 0.35rem;\n}\n\n/* Afterword */\n.afterword {\n  margin-top: 7rem;\n  padding-top: 3rem;\n  border-top: 1.5px solid var(--ink);\n}\n\n.afterword h2 {\n  font-size: 2rem;\n  font-variation-settings: \"opsz\" 36, \"SOFT\" 70;\n  font-weight: 400;\n  letter-spacing: -0.02em;\n  margin-bottom: 1.25rem;\n}\n\n.afterword p { max-width: var(--measure); margin-bottom: 1.15rem; }\n\n.afterword ul {\n  max-width: var(--measure);\n  margin: 1rem 0 2rem 1.6rem;\n}\n\n.afterword ul li { margin-bottom: 0.4rem; }\n\n/* Cheat sheet */\n.cheat {\n  margin: 3.5rem 0;\n  padding: 2rem 2.25rem;\n  background: var(--bg-elevated);\n  border-radius: 12px;\n  border: 1px solid var(--line);\n}\n\n.cheat h3 {\n  font-size: 1.5rem;\n  margin-bottom: 1.25rem;\n  font-weight: 500;\n  font-variation-settings: \"opsz\" 24, \"SOFT\" 60;\n}\n\n.cheat-section { margin-bottom: 1.75rem; }\n.cheat-section:last-child { margin-bottom: 0; }\n\n.cheat-section-label {\n  font-size: 0.7rem;\n  text-transform: uppercase;\n  letter-spacing: 0.14em;\n  font-weight: 500;\n  color: var(--ink-muted);\n  margin-bottom: 0.7rem;\n  font-family: var(--mono);\n}\n\ndl.cmd-list {\n  display: grid;\n  grid-template-columns: max-content 1fr;\n  gap: 0.45rem 1.4rem;\n  font-size: 0.92rem;\n  align-items: baseline;\n}\n\ndl.cmd-list dt {\n  font-family: var(--mono);\n  font-size: 0.84rem;\n  color: var(--ink);\n  white-space: nowrap;\n}\n\ndl.cmd-list dd { color: var(--ink-soft); }\n\n/* When things go weird */\n.weird {\n  margin: 3.5rem 0;\n}\n\n.weird h3 {\n  font-size: 1.4rem;\n  font-weight: 500;\n  margin-bottom: 1.25rem;\n  font-variation-settings: \"opsz\" 24, \"SOFT\" 60;\n}\n\n.weird-list {\n  list-style: none;\n  max-width: var(--measure);\n}\n\n.weird-list li {\n  padding: 1rem 0;\n  border-top: 1px solid var(--line);\n}\n\n.weird-list li:last-child { border-bottom: 1px solid var(--line); }\n\n.weird-q {\n  font-style: italic;\n  color: var(--ink);\n  margin-bottom: 0.3rem;\n  font-variation-settings: \"opsz\" 18, \"SOFT\" 80;\n}\n\n.weird-a { color: var(--ink-soft); font-size: 0.97rem; }\n\n/* Closing */\n.closing {\n  margin-top: 5rem;\n  padding-top: 3rem;\n  border-top: 1px solid var(--line);\n  text-align: center;\n  font-size: 1.15rem;\n  font-style: italic;\n  color: var(--ink-soft);\n  font-variation-settings: \"opsz\" 20, \"SOFT\" 80;\n  max-width: var(--measure);\n  margin-left: auto;\n  margin-right: auto;\n}\n\n/* Mobile */\n@media (max-width: 900px) {\n  .shell { grid-template-columns: 1fr; }\n  aside.sidebar {\n    position: relative;\n    height: auto;\n    border-right: none;\n    border-bottom: 1px solid var(--line);\n    padding: 1.5rem;\n  }\n  main { padding: 2.5rem 1.5rem 4rem; }\n  body { font-size: 17px; }\n  h1.title { font-size: 2.6rem; }\n  .copy-btn { opacity: 1; }\n  .cheat { padding: 1.5rem 1.25rem; }\n  dl.cmd-list { grid-template-columns: 1fr; gap: 0.15rem 0; }\n  dl.cmd-list dd { margin-bottom: 0.5rem; }\n}\n\n/* Print-ish */\n@media (prefers-reduced-motion: reduce) {\n  html { scroll-behavior: auto; }\n  * { transition: none !important; }\n}\n\n/* =====================================================================\n   AI 101 SKIN — body sans / heading serif split, phase color cycling,\n   dark code blocks, split-pill brand badge.\n   ===================================================================== */\n\n/* Body becomes Source Sans; headings stay Fraunces */\nbody {\n  font-family: var(--sans);\n  font-feature-settings: normal;\n  font-variation-settings: normal;\n  color: var(--ink);\n}\n\n.brand,\nh1.title,\nh2.phase-title,\nh3.day-title,\n.afterword h2,\n.cheat h3,\n.weird h3 {\n  font-family: var(--serif);\n  color: var(--heading);\n}\nh1.title       { font-variation-settings: \"opsz\" 96; }\nh2.phase-title { font-variation-settings: \"opsz\" 48; }\nh3.day-title   { font-variation-settings: \"opsz\" 32; }\n.afterword h2, .cheat h3, .weird h3 { font-variation-settings: \"opsz\" 36; }\n.cheat h3 { color: var(--heading); }\nstrong { color: var(--heading); }\n.day-body em { color: var(--heading); }\n\n/* Italic editorial bits keep their slant via Source Sans italic */\n.subtitle, .phase-sub, .weird-q, .closing, .reset-link, .time-note { font-style: italic; }\n\n/* Phase color system: teal -> violet -> orange -> blue.\n   Set on the phase section AND all its following day siblings so\n   labels, learned-boxes and buttons inherit the right hue. */\n#phase-1, #phase-1 ~ article.day { --accent:#0d9488; --accent-hover:#0f766e; --accent-soft:#99f6e4; --accent-faint:#ccfbf1; }\n#phase-2, #phase-2 ~ article.day { --accent:#7c3aed; --accent-hover:#6d28d9; --accent-soft:#ddd6fe; --accent-faint:#ede9fe; }\n#phase-3, #phase-3 ~ article.day { --accent:#ea580c; --accent-hover:#c2410c; --accent-soft:#fed7aa; --accent-faint:#ffedd5; }\n#phase-4, #phase-4 ~ article.day { --accent:#2563eb; --accent-hover:#1d4ed8; --accent-soft:#bfdbfe; --accent-faint:#dbeafe; }\n\n/* Links: AI 101 blue, violet on hover (sidebar/nav excluded) */\nmain a { color:#2563eb; text-decoration:none; border-bottom:1px solid #bfdbfe; transition:color 150ms var(--ease-out), border-color 150ms var(--ease-out); }\nmain a:hover { color:#6d28d9; border-color:#6d28d9; text-decoration:none; }\n\n/* Sidebar in white, AI 101 surface */\naside.sidebar { background: var(--white, #ffffff); border-right:1px solid var(--line); }\n\n/* Brand split-pill badge (B4 device) */\n.brand-badge {\n  display:inline-grid;\n  grid-template-columns:auto 1px auto;\n  align-items:stretch;\n  background:#1e293b;\n  border-radius:5px;\n  overflow:hidden;\n  font-family:var(--mono);\n  font-size:0.8rem;\n  font-weight:500;\n  letter-spacing:0.09em;\n  line-height:1;\n  margin-bottom:0.75rem;\n}\n.brand-badge .bb-l { padding:0.45em 0.6em; color:#ffffff; }\n.brand-badge .bb-r { padding:0.45em 0.6em; color:#fb923c; font-weight:700; }\n.brand-badge .bb-div { background:rgba(255,255,255,0.18); }\n.brand { font-size:1.5rem; letter-spacing:-0.02em; }\n\n/* Dark code blocks — AI 101 'pre' treatment (slate-900) */\n.codeblock {\n  background:#1e293b;\n  border:1px solid #334155;\n}\n.codeblock pre { color:#e2e8f0; }\ncode.inline {\n  background:var(--bg-code);\n  border:1px solid var(--line);\n  color:var(--heading);\n}\n.copy-btn {\n  background:rgba(255,255,255,0.07);\n  border:1px solid rgba(255,255,255,0.18);\n  color:#cbd5e1;\n}\n.copy-btn:hover { color:#ffffff; border-color:rgba(255,255,255,0.55); }\n.copy-btn.copied { color:#86efac; border-color:#86efac; }\n\n/* Callout & cheat surfaces on white with subtle border */\n.callout { background:var(--bg-elevated); border-left:3px solid var(--accent); border:1px solid var(--line); border-left:3px solid var(--accent); }\n.cheat { background:var(--bg-elevated); }\n.learned { background:var(--accent-faint); }\n\n/* Phase top rule + day-title tick echo the phase hue */\n.phase { border-top:1.5px solid var(--heading); }\n.afterword { border-top:1.5px solid var(--heading); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"shell\">\n\n<aside class=\"sidebar\">\n  <div class=\"brand-badge\"><span class=\"bb-l\">30<\u002Fspan><span class=\"bb-div\"><\u002Fspan><span class=\"bb-r\">DAYS<\u002Fspan><\u002Fdiv>\n  <div class=\"brand\">to Claude&nbsp;Code<\u002Fdiv>\n  <div class=\"brand-sub\">A gentle start<\u002Fdiv>\n\n  <div class=\"progress-meter\">\n    <div class=\"progress-label\">\n      <span>Progress<\u002Fspan>\n      <span><span class=\"pct\" id=\"pct\">0<\u002Fspan> of 31 days<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"progress-bar\"><div class=\"progress-fill\" id=\"progressFill\"><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <nav id=\"sidenav\">\n    <div class=\"nav-phase\">\n      <div class=\"nav-phase-title\">Before you start<\u002Fdiv>\n      <a class=\"nav-day\" href=\"#day-0\" data-day=\"0\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">00<\u002Fspan><span>Setup<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n\n    <div class=\"nav-phase\">\n      <div class=\"nav-phase-title\">Phase 1 · Getting Comfortable<\u002Fdiv>\n      <a class=\"nav-day\" href=\"#day-1\" data-day=\"1\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">01<\u002Fspan><span>First Conversation<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-2\" data-day=\"2\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">02<\u002Fspan><span>Moving Around<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-3\" data-day=\"3\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">03<\u002Fspan><span>Make a Home Base<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-4\" data-day=\"4\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">04<\u002Fspan><span>Reading &amp; Reacting<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-5\" data-day=\"5\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">05<\u002Fspan><span>Cleaning Up a Mess<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-6\" data-day=\"6\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">06<\u002Fspan><span>Asking Your Computer<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-7\" data-day=\"7\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">07<\u002Fspan><span>Look Back<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n\n    <div class=\"nav-phase\">\n      <div class=\"nav-phase-title\">Phase 2 · Real Work<\u002Fdiv>\n      <a class=\"nav-day\" href=\"#day-8\" data-day=\"8\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">08<\u002Fspan><span>Read Something Hard<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-9\" data-day=\"9\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">09<\u002Fspan><span>Change the Shape<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-10\" data-day=\"10\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">10<\u002Fspan><span>Compare Two Things<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-11\" data-day=\"11\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">11<\u002Fspan><span>Numbers and Data<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-12\" data-day=\"12\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">12<\u002Fspan><span>Downloads Disaster<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-13\" data-day=\"13\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">13<\u002Fspan><span>Explore Unknown<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-14\" data-day=\"14\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">14<\u002Fspan><span>Free Day<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n\n    <div class=\"nav-phase\">\n      <div class=\"nav-phase-title\">Phase 3 · Building Tools<\u002Fdiv>\n      <a class=\"nav-day\" href=\"#day-15\" data-day=\"15\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">15<\u002Fspan><span>First Mini-Tool<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-16\" data-day=\"16\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">16<\u002Fspan><span>Make It Smarter<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-17\" data-day=\"17\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">17<\u002Fspan><span>Several Things in a Row<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-18\" data-day=\"18\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">18<\u002Fspan><span>When Things Break<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-19\" data-day=\"19\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">19<\u002Fspan><span>Time Machine (Git)<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-20\" data-day=\"20\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">20<\u002Fspan><span>Undoing Mistakes<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-21\" data-day=\"21\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">21<\u002Fspan><span>Build Something Real<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-22\" data-day=\"22\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">22<\u002Fspan><span>Inventory<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n\n    <div class=\"nav-phase\">\n      <div class=\"nav-phase-title\">Phase 4 · Making It Yours<\u002Fdiv>\n      <a class=\"nav-day\" href=\"#day-23\" data-day=\"23\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">23<\u002Fspan><span>Teach Claude Context<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-24\" data-day=\"24\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">24<\u002Fspan><span>Find Your Annoyances<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-25\" data-day=\"25\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">25<\u002Fspan><span>Across Many Files<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-26\" data-day=\"26\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">26<\u002Fspan><span>Tell Claude Preferences<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-27\" data-day=\"27\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">27<\u002Fspan><span>Solve a Real Problem<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-28\" data-day=\"28\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">28<\u002Fspan><span>Try Something Ambitious<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-29\" data-day=\"29\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">29<\u002Fspan><span>Teach Someone<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#day-30\" data-day=\"30\"><span class=\"day-dot\"><\u002Fspan><span class=\"day-num\">30<\u002Fspan><span>Look at the Map<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n\n    <div class=\"nav-phase\">\n      <div class=\"nav-phase-title\">After<\u002Fdiv>\n      <a class=\"nav-day\" href=\"#cheat-sheet\"><span class=\"day-num\"><\u002Fspan><span>Cheat sheet<\u002Fspan><\u002Fa>\n      <a class=\"nav-day\" href=\"#troubleshoot\"><span class=\"day-num\"><\u002Fspan><span>When things go weird<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <button class=\"reset-link\" id=\"resetBtn\">Reset all progress<\u002Fbutton>\n<\u002Faside>\n\n<main>\n\n<section class=\"intro\">\n  <h1 class=\"title\">30 Days to Claude Code<\u002Fh1>\n  <p class=\"subtitle\">A gentle start for people who’ve never used the terminal before.<\u002Fp>\n\n  <div class=\"intro-body\">\n    <p>If the word <em>terminal<\u002Fem> makes you a little nervous, you’re in the right place. This guide assumes you have <strong>never typed a command into a black window in your life<\u002Fstrong>, and that’s totally fine.<\u002Fp>\n\n    <p>Here’s the deal: Claude Code lives inside a thing called the <strong>Terminal<\u002Fstrong>. The terminal is just a window where you type instructions to your computer instead of clicking on things. That’s it. It looks intimidating because there are no buttons, but you’ll be comfortable with it within a week.<\u002Fp>\n\n    <p>A few promises before we start:<\u002Fp>\n\n    <ul class=\"promise-list\">\n      <li><span>The commands in this guide are safe. The basics — looking around, moving between folders — can’t hurt anything. Later, when Claude is doing more (creating files, moving things), it’ll ask permission first. You’ll see what it’s about to do before it happens.<\u002Fspan><\u002Fli>\n      <li><span>Claude will explain anything you don’t understand. When in doubt, ask it: <em>“What does this mean?”<\u002Fem> or <em>“Is this safe to run?”<\u002Fem><\u002Fspan><\u002Fli>\n      <li><span>Going slow is fine. This is a 30-day program, but if a day takes you two days, who cares.<\u002Fspan><\u002Fli>\n      <li><span>Copy and paste is allowed. You don’t need to type commands by hand. Highlight the command, Cmd+C, click into the terminal, Cmd+V, hit Enter.<\u002Fspan><\u002Fli>\n      <li><span>It uses your Claude subscription. Claude Code requires a paid plan (Pro is plenty for this program). Very heavy use can hit plan limits; the pace here won’t bump into anything.<\u002Fspan><\u002Fli>\n    <\u002Ful>\n\n    <p>A few things this guide assumes:<\u002Fp>\n\n    <ul class=\"promise-list\">\n      <li><span>You’re on a Mac (macOS 13 or later). Windows users — Anthropic has a parallel walkthrough at <a href=\"https://code.claude.com/docs/en/terminal-guide\">code.claude.com/docs/en/terminal-guide<\u002Fa>.<\u002Fspan><\u002Fli>\n      <li><span>If your work involves patient health information, stick to non-clinical files for this program — your own notes, drafts, downloads. PHI on a personal machine is a separate setup conversation worth having before you point Claude at it.<\u002Fspan><\u002Fli>\n    <\u002Ful>\n\n    <p class=\"time-note\">Time per day: 10 to 20 minutes. Some days are very short.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ───────────── DAY 0 ───────────── -->\n<article class=\"day\" id=\"day-0\">\n  <header class=\"day-header\">\n    <span class=\"day-label\">Day 00<\u002Fspan>\n    <h3 class=\"day-title\">Setup — before Day 1<\u002Fh3>\n  <\u002Fheader>\n  <div class=\"day-body\">\n    <p><strong>What Claude Code is.<\u002Fstrong> Claude Code is Claude — the same AI you might already use in a browser — running inside your terminal. The difference matters. In a browser tab, Claude can only see what you paste in. Here, with your permission, it can read your files, create new ones, run commands, and help you build small tools. Everything stays on your computer. You’re always the one deciding what it does.<\u002Fp>\n\n    <p><strong>Open the Terminal.<\u002Fstrong> On your Mac:<\u002Fp>\n    <ol>\n      <li>Press <code class=\"inline\">Cmd + Space<\u002Fcode> (this opens Spotlight search).<\u002Fli>\n      <li>Type <code class=\"inline\">Terminal<\u002Fcode>.<\u002Fli>\n      <li>Hit Enter.<\u002Fli>\n    <\u002Fol>\n    <p>A window opens with some text and a blinking cursor. That’s the terminal. You did it.<\u002Fp>\n\n    <p>You’ll see something like this:<\u002Fp>\n    <div class=\"codeblock\"><pre>yourname@MacBook ~ %<\u002Fpre><\u002Fdiv>\n\n    <p>This is called the <strong>prompt<\u002Fstrong>. The computer is waiting for you to type. The <code class=\"inline\">%<\u002Fcode> (or sometimes <code class=\"inline\">$<\u002Fcode>) means “I’m ready for instructions.”<\u002Fp>\n\n    <p><strong>What is “typing a command”?<\u002Fstrong> You type words at the prompt, then press Enter. The computer does the thing. That’s the whole interaction.<\u002Fp>\n\n    <p>Try this. Type these letters exactly and press Enter:<\u002Fp>\n    <div class=\"codeblock\"><pre>pwd<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n    <p>You’ll see something like <code class=\"inline\">/Users/yourname<\u002Fcode>. That just told you which folder you’re currently “in.” More on that tomorrow.<\u002Fp>\n\n    <p><strong>Install Claude Code.<\u002Fstrong> Copy this line, paste it into your terminal (Cmd+V), and press Enter:<\u002Fp>\n    <div class=\"codeblock\"><pre>curl -fsSL https://claude.ai/install.sh | bash<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n    <p>You’ll see text scroll by. When it finishes, you should see “Claude Code successfully installed!” If something goes wrong, the official troubleshooting is at <a href=\"https://code.claude.com/docs/en/terminal-guide\">code.claude.com/docs/en/terminal-guide<\u002Fa>.<\u002Fp>\n\n    <p>To check it worked, <strong>close the Terminal window and open a new one<\u002Fstrong>, then type:<\u002Fp>\n    <div class=\"codeblock\"><pre>claude --version<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n    <p>If you see a version number, you’re set.<\u002Fp>\n\n    <div class=\"callout\">\n      <div class=\"callout-label\">If you ever feel stuck<\u002Fdiv>\n      Press <strong>Ctrl + C<\u002Fstrong>. That cancels whatever is happening and gives you back the prompt. To close the terminal entirely: Cmd + Q, or just close the window.\n    <\u002Fdiv>\n\n    <p><strong>You’re the one deciding.<\u002Fstrong> Claude will sometimes suggest commands, and sometimes ask permission to change a file. You are never required to say yes. If anything feels uncertain, you can ask what a command does before running it, ask Claude to explain its plan first, or just close the window and come back tomorrow. Nothing breaks if you pause.<\u002Fp>\n\n    <p>OK. You’re ready.<\u002Fp>\n\n    <button class=\"complete-btn\" data-day=\"0\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<!-- ═════════ PHASE 1 ═════════ -->\n<section class=\"phase\" id=\"phase-1\">\n  <div class=\"phase-num\">Phase One<\u002Fdiv>\n  <h2 class=\"phase-title\">Getting Comfortable<\u002Fh2>\n  <p class=\"phase-sub\">Days 1 to 7 · Learning where you are and how to talk to Claude.<\u002Fp>\n  <p class=\"phase-intro\">The hardest part of the terminal isn’t the commands. It’s the feeling of being lost. This week is about building a mental map: where are you, where can you go, and how do you ask Claude for help.<\u002Fp>\n<\u002Fsection>\n\n<article class=\"day\" id=\"day-1\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 01<\u002Fspan><h3 class=\"day-title\">First Conversation<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>Open the terminal (Cmd+Space, then “Terminal,” then Enter).<\u002Fp>\n    <p>Type:<\u002Fp>\n    <div class=\"codeblock\"><pre>claude<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n    <p>Press Enter. Claude Code starts up. The prompt changes. Now Claude is listening.<\u002Fp>\n\n    <div class=\"callout\">\n      <div class=\"callout-label\">First time only<\u002Fdiv>\n      A browser tab will open asking you to log in. That’s expected — Claude needs to know which account is yours. Approve it, then come back to the terminal. You won’t see this prompt again on this computer.\n    <\u002Fdiv>\n\n    <p>Type this and press Enter:<\u002Fp>\n    <div class=\"codeblock\"><pre>Hi Claude. I'm brand new to the terminal. Can you tell me where I am in my computer right now, and explain what that means in plain English?<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Read Claude’s answer. Then ask:<\u002Fp>\n    <div class=\"codeblock\"><pre>What's in this folder? Show me as a simple list.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>When you’re done, type:<\u002Fp>\n    <div class=\"codeblock\"><pre>/exit<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n    <p>and press Enter. That closes Claude. You’re back to the regular terminal prompt.<\u002Fp>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      You can talk to your computer in normal English now. Claude translates between what you want and what the system needs to hear.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"1\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-2\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 02<\u002Fspan><h3 class=\"day-title\">Moving Around Without Claude<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>Today, no Claude. We’re just going to practice moving between folders, because folders are where everything lives.<\u002Fp>\n\n    <p>Three commands. That’s all you need.<\u002Fp>\n\n    <div class=\"codeblock\"><pre>pwd<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n    <p>Stands for “print working directory.” It tells you where you are. Try it.<\u002Fp>\n\n    <div class=\"codeblock\"><pre>ls<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n    <p>Lists what’s in the folder you’re in. Try it. You’ll see things like <code class=\"inline\">Documents<\u002Fcode>, <code class=\"inline\">Downloads<\u002Fcode>, <code class=\"inline\">Desktop<\u002Fcode>.<\u002Fp>\n\n    <div class=\"codeblock\"><pre>cd Documents<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n    <p><code class=\"inline\">cd<\u002Fcode> means “change directory.” It moves you into a folder. Try <code class=\"inline\">cd Documents<\u002Fcode>, then run <code class=\"inline\">pwd<\u002Fcode> again. See? You moved.<\u002Fp>\n\n    <p>To go back up one level (out of Documents, back to your home folder):<\u002Fp>\n    <div class=\"codeblock\"><pre>cd ..<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n    <p>The two dots mean “the folder above this one.”<\u002Fp>\n\n    <p>To jump straight to your home folder from anywhere:<\u002Fp>\n    <div class=\"codeblock\"><pre>cd ~<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n    <p>The <code class=\"inline\">~<\u002Fcode> (tilde) is shorthand for your home folder.<\u002Fp>\n\n    <p><strong>Practice.<\u002Fstrong> Use <code class=\"inline\">cd<\u002Fcode>, <code class=\"inline\">ls<\u002Fcode>, and <code class=\"inline\">pwd<\u002Fcode> to wander around. Go into Documents, then Downloads, then back home. Get a feel for moving.<\u002Fp>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      You’re always <em>somewhere<\u002Fem> in your computer. These three commands let you find out where, see what’s around, and move.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"2\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-3\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 03<\u002Fspan><h3 class=\"day-title\">Make a Home Base<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>Today we’ll create a folder where you’ll do all your practice for the next 28 days.<\u002Fp>\n\n    <p>First, get into your home folder:<\u002Fp>\n    <div class=\"codeblock\"><pre>cd ~<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Now start Claude:<\u002Fp>\n    <div class=\"codeblock\"><pre>claude<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Ask Claude:<\u002Fp>\n    <div class=\"codeblock\"><pre>Please create a folder in my home directory called claude-lab. Inside it, create a file called reflections.md with today's date as a header and a short note saying this is where I'll track what I learn.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Then ask:<\u002Fp>\n    <div class=\"codeblock\"><pre>Show me what you created so I can see it.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"callout\">\n      <div class=\"callout-label\">A note on permissions<\u002Fdiv>\n      When Claude is about to create or change a file, it’ll usually show you the plan and ask for permission first. Read it. If it looks right, approve. If not, say no, or ask Claude to explain. That confirmation step is how you stay in the loop — it’s a feature, not a hassle.\n    <\u002Fdiv>\n\n    <p>Exit Claude with <code class=\"inline\">/exit<\u002Fcode>.<\u002Fp>\n\n    <p>Back at the regular terminal, navigate into your new folder:<\u002Fp>\n    <div class=\"codeblock\"><pre>cd ~/claude-lab\nls<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>You should see <code class=\"inline\">reflections.md<\u002Fcode>.<\u002Fp>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Claude can create files and folders for you. You don’t need to remember the commands. You just describe what you want.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"3\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-4\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 04<\u002Fspan><h3 class=\"day-title\">Reading and Reacting<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>Find any document on your computer you’ve written recently. Notes, a draft, an email you saved, anything with text. If you can’t think of one, just use the <code class=\"inline\">reflections.md<\u002Fcode> you made yesterday.<\u002Fp>\n\n    <p>Get into your claude-lab folder:<\u002Fp>\n    <div class=\"codeblock\"><pre>cd ~/claude-lab\nclaude<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Ask Claude:<\u002Fp>\n    <div class=\"codeblock\"><pre>Read the file at [paste the full path to your document] and tell me three things: What's it about? What's the main point? What questions does it leave unanswered?<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"callout\">\n      <div class=\"callout-label\">Tip on file paths<\u002Fdiv>\n      If your file is on your Desktop, the path is <code class=\"inline\">~/Desktop/filename.txt<\u002Fcode>. If it’s in Documents, it’s <code class=\"inline\">~/Documents/filename.txt<\u002Fcode>. The <code class=\"inline\">~<\u002Fcode> always means “starting from my home folder.”\n    <\u002Fdiv>\n\n    <p>Try a follow-up question based on what Claude said.<\u002Fp>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Claude can read your files and think about them, not just summarize. It’s like having a smart friend look over your shoulder.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"4\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-5\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 05<\u002Fspan><h3 class=\"day-title\">Cleaning Up a Mess<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>Open Claude in your lab folder:<\u002Fp>\n    <div class=\"codeblock\"><pre>cd ~/claude-lab\nclaude<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Ask Claude to create a messy file:<\u002Fp>\n    <div class=\"codeblock\"><pre>Create a file called raw-notes.txt and fill it with about 15 random unorganized notes. A stream of consciousness mix of ideas, errands, questions, and observations. Make it look like real messy notes.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Look at the file (ask Claude to show it to you, or open it in Finder if that’s easier).<\u002Fp>\n\n    <p>Now ask:<\u002Fp>\n    <div class=\"codeblock\"><pre>Look at the messy notes you just made. Find the themes hiding in there, then reorganize everything into a clean outline. Save the clean version as organized-notes.md.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Claude is great at finding structure in chaos. This is one of the most useful things it does, turning rough material into something usable.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"5\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-6\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 06<\u002Fspan><h3 class=\"day-title\">Asking Your Computer Questions<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>You can ask Claude questions about your own computer that would normally take a lot of clicking around.<\u002Fp>\n\n    <div class=\"codeblock\"><pre>cd ~\nclaude<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Try these one at a time:<\u002Fp>\n\n    <div class=\"codeblock\"><pre>What are the 10 biggest files in my Downloads folder?<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n    <div class=\"codeblock\"><pre>How much free space do I have on my hard drive?<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n    <div class=\"codeblock\"><pre>What apps do I have installed?<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n    <div class=\"codeblock\"><pre>What's been modified in my Documents folder this week?<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Pick one answer that surprises you and ask a follow-up.<\u002Fp>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Your computer knows a lot about itself. You don’t have to dig through Finder anymore. You can just ask.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"6\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-7\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 07<\u002Fspan><h3 class=\"day-title\">Look Back<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <div class=\"codeblock\"><pre>cd ~/claude-lab\nclaude<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Ask Claude:<\u002Fp>\n    <div class=\"codeblock\"><pre>Take a look at everything in this folder and tell me what we've built together this first week.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Then:<\u002Fp>\n    <div class=\"codeblock\"><pre>Add a section to reflections.md called \"Week 1\" with a short summary of what I learned and what still feels confusing.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Finally:<\u002Fp>\n    <div class=\"codeblock\"><pre>What's one thing I should try this week that I haven't tried yet?<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Periodic check-ins keep you oriented. Claude is happy to help you reflect, not just produce.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"7\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<!-- ═════════ PHASE 2 ═════════ -->\n<section class=\"phase\" id=\"phase-2\">\n  <div class=\"phase-num\">Phase Two<\u002Fdiv>\n  <h2 class=\"phase-title\">Doing Real Work<\u002Fh2>\n  <p class=\"phase-sub\">Days 8 to 14 · Applying what you know to actual things in your life.<\u002Fp>\n  <p class=\"phase-intro\">You’ve practiced enough. Now we use Claude on real stuff. Your real documents, your real folders, your real questions.<\u002Fp>\n  <p class=\"phase-intro\">A small reframe before we move on: you might have noticed you haven’t actually memorized many commands. That’s not an accident — it’s the whole point. You’re learning a <em>pattern<\u002Fem>: describe what you want, look at what Claude did, refine it, and (later in this program) save the useful ones. The pattern transfers to anything. The commands don’t.<\u002Fp>\n<\u002Fsection>\n\n<article class=\"day\" id=\"day-8\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 08<\u002Fspan><h3 class=\"day-title\">Read Something Hard<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>Find a long document you’ve been meaning to read or process. A report, an article you saved, meeting notes, anything.<\u002Fp>\n\n    <div class=\"codeblock\"><pre>cd ~/claude-lab\nclaude<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"codeblock\"><pre>Read the document at [path to your document]. Give me three summaries: one sentence, one paragraph, one page. Then tell me what assumptions the author is making without saying so directly.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Claude doesn’t just summarize. It reads critically. Use this when you don’t have time to read something carefully yourself.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"8\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-9\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 09<\u002Fspan><h3 class=\"day-title\">Change the Shape of Things<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>Pick something you have in one format and ask Claude to convert it to another. For example:<\u002Fp>\n    <ul>\n      <li>Messy meeting notes into a clean checklist of action items<\u002Fli>\n      <li>A wandering brainstorm into a structured proposal<\u002Fli>\n      <li>A long email chain into a one-paragraph summary<\u002Fli>\n      <li>A list of names and numbers into a formatted table<\u002Fli>\n    <\u002Ful>\n\n    <p>Here’s what one of these looks like in practice. If you start with messy notes like:<\u002Fp>\n    <div class=\"codeblock\"><pre>- call jen\n- budget weird\n- maybe move launch\n- ask about signup bug<\u002Fpre><\u002Fdiv>\n\n    <p>You might ask Claude to turn them into:<\u002Fp>\n    <div class=\"codeblock\"><pre>## Action Items\n- Call Jen\n- Investigate signup bug\n\n## Decisions Pending\n- Whether to move launch\n\n## Finance\n- Review budget discrepancy<\u002Fpre><\u002Fdiv>\n\n    <p>Try two of these.<\u002Fp>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Format changes that used to take 20 minutes of copy-paste-edit now take 20 seconds.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"9\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-10\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 10<\u002Fspan><h3 class=\"day-title\">Compare Two Things<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>Find two documents about a similar topic. Two articles, two drafts, two sets of notes.<\u002Fp>\n\n    <div class=\"codeblock\"><pre>claude<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"codeblock\"><pre>I have two documents at [path 1] and [path 2]. Read both. Where do they agree? Where do they disagree? If you had to write one document that combined the best of both, what would it say?<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Holding two things in your head and comparing them is hard. Claude is good at this kind of comparison work.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"10\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-11\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 11<\u002Fspan><h3 class=\"day-title\">Numbers and Data<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>If you have a spreadsheet or CSV file, use it. If not, ask Claude to make one:<\u002Fp>\n    <div class=\"codeblock\"><pre>Make me a CSV file with 25 rows of fake but realistic data about books: title, author, year, genre, rating.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Then:<\u002Fp>\n    <div class=\"codeblock\"><pre>Look at the CSV. What's the average rating? Which genre shows up most? Are there any obvious errors or weird entries?<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"codeblock\"><pre>Make a cleaned-up version and save it as books-clean.csv.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      You don’t need to be a spreadsheet wizard. Claude can answer data questions in plain English.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"11\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-12\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 12<\u002Fspan><h3 class=\"day-title\">The Downloads Folder Disaster<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>Almost everyone’s Downloads folder is a junkyard. Let’s start to fix yours — safely.<\u002Fp>\n\n    <div class=\"codeblock\"><pre>cd ~\nclaude<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"codeblock\"><pre>Take a look at my Downloads folder. Tell me what's in there: how many files, what types, how much space they take up, and how old most of them are.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"codeblock\"><pre>Propose a way to organize this. Don't do anything yet, just suggest a plan.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>If the plan sounds good, start small:<\u002Fp>\n    <div class=\"codeblock\"><pre>Create a folder called Downloads-Archive inside Downloads. Move only the obvious junk into it — old installers, files I clearly don't need anymore. Don't delete anything. Show me each move as you go.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Look at what Claude moved. If you’re comfortable with how it went, do a second pass with more files. Save deletion for later, once you’ve seen how Claude approaches your folder.<\u002Fp>\n\n    <div class=\"callout\">\n      <div class=\"callout-label\">Important<\u002Fdiv>\n      Today, don’t delete anything. Moving files into the archive folder is reversible — you can always pull them back. Deletion is a separate decision for a later day.\n    <\u002Fdiv>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Organizing is a task you can delegate. You don’t have to do it yourself.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"12\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-13\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 13<\u002Fspan><h3 class=\"day-title\">Explore Something You Didn’t Make<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>Find a folder on your computer that you didn’t create or don’t fully understand. Maybe a project someone shared, an app’s settings folder, or a downloaded codebase.<\u002Fp>\n\n    <div class=\"codeblock\"><pre>claude<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"codeblock\"><pre>Take a look at the folder at [path]. Explain what it is, how it's organized, and what the most important files seem to be. Pretend I've never seen it before.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Unfamiliar things become familiar fast when you have a guide who can read everything at once.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"13\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-14\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 14<\u002Fspan><h3 class=\"day-title\">Free Day<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>No new instructions today. Pick one real task from your actual life and try to use Claude for it.<\u002Fp>\n\n    <p>When you’re done, update your reflections.md:<\u002Fp>\n    <div class=\"codeblock\"><pre>cd ~/claude-lab\nclaude<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n    <div class=\"codeblock\"><pre>Add a section to reflections.md called \"Week 2\" with what I tried, what worked, and what was harder than I expected.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Transfer. The point isn’t to follow this guide forever. It’s to recognize when Claude would help you.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"14\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<!-- ═════════ PHASE 3 ═════════ -->\n<section class=\"phase\" id=\"phase-3\">\n  <div class=\"phase-num\">Phase Three<\u002Fdiv>\n  <h2 class=\"phase-title\">Saving Your Work and Building Tools<\u002Fh2>\n  <p class=\"phase-sub\">Days 15 to 22 · From asking Claude things to making your own helpers.<\u002Fp>\n  <p class=\"phase-intro\">Up to now, every conversation with Claude has been one-and-done. This week, you’ll start making things that <em>stay<\u002Fem>. Little tools you can run again later.<\u002Fp>\n<\u002Fsection>\n\n<article class=\"day\" id=\"day-15\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 15<\u002Fspan><h3 class=\"day-title\">Your First Mini-Tool<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>A heads-up before you start: when this guide says “tool,” it doesn’t mean an app with windows and buttons. It means a small file — usually a short script — that you can run from the terminal and it does one specific thing for you. Think “saved instruction” more than “software.”<\u002Fp>\n\n    <div class=\"codeblock\"><pre>cd ~/claude-lab\nclaude<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Pick one of these and ask Claude to build it:<\u002Fp>\n    <ul>\n      <li>A tool that creates a new dated journal entry every time I run it.<\u002Fli>\n      <li>A tool that adds a line to a running to-do file with a timestamp.<\u002Fli>\n      <li>A tool that shows me everything I’ve changed in my Documents folder today.<\u002Fli>\n    <\u002Ful>\n\n    <p>Once Claude builds it, ask:<\u002Fp>\n    <div class=\"codeblock\"><pre>Now show me exactly how to run this. Walk me through it like I've never done this before.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Try running it.<\u002Fp>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      You can save instructions for later. Instead of asking Claude to do something every time, you build a tool once and reuse it.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"15\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-16\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 16<\u002Fspan><h3 class=\"day-title\">Make It Smarter<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>Take yesterday’s tool and ask Claude to add something.<\u002Fp>\n    <p>If it makes a journal entry, ask it to also include the weather. If it logs to-do items, ask it to mark them with categories. If it shows your changes, ask it to also tell you the file sizes.<\u002Fp>\n\n    <div class=\"codeblock\"><pre>Modify the tool you made yesterday so that it also [thing you want].<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Tools grow with you. Start simple, then add what you need.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"16\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-17\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 17<\u002Fspan><h3 class=\"day-title\">Doing Several Things in a Row<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>Ask Claude:<\u002Fp>\n    <div class=\"codeblock\"><pre>Make me a tool that does four things when I run it:\n1. Checks that a folder called \"daily-notes\" exists, and creates it if not.\n2. Makes a new file inside named with today's date.\n3. Puts a header in the file with the date and time.\n4. Opens the file for me to start writing.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Run it.<\u002Fp>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Real automation chains multiple steps together. Each step sets up the next.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"17\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-18\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 18<\u002Fspan><h3 class=\"day-title\">When Something Breaks<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>Take any tool you’ve made and intentionally break it. Change a folder name, delete a piece, anything.<\u002Fp>\n\n    <p>Run it. Watch the error message.<\u002Fp>\n\n    <p>Before asking Claude to fix it, ask:<\u002Fp>\n    <div class=\"codeblock\"><pre>This error came up: [paste the error]. What does it mean? Don't fix it yet, just help me understand what went wrong.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Then ask Claude to fix it together with you.<\u002Fp>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Errors aren’t scary. They’re the computer telling you exactly what’s wrong. The more you read them, the less they intimidate you.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"18\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-19\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 19<\u002Fspan><h3 class=\"day-title\">A Time Machine for Your Files (Git)<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>Git is a tool that lets you save snapshots of your work and go back if you mess up. It has a reputation for being confusing. Claude makes it easy.<\u002Fp>\n\n    <div class=\"codeblock\"><pre>cd ~/claude-lab\nclaude<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"codeblock\"><pre>Set up git in this folder. I've never used git before, so explain what you're doing as you go.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Then:<\u002Fp>\n    <div class=\"codeblock\"><pre>Save a snapshot of everything we have right now, and label it \"end of week 3 setup.\"<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Change something in reflections.md. Then:<\u002Fp>\n    <div class=\"codeblock\"><pre>What's changed since my last snapshot?<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"codeblock\"><pre>Save another snapshot with a label that describes what changed.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Git is just labeled snapshots. Don’t worry about the rest. Claude handles the commands.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"19\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-20\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 20<\u002Fspan><h3 class=\"day-title\">Undoing Mistakes<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>In your lab folder, do something “bad.” Delete a section of reflections.md, mess up the formatting, whatever.<\u002Fp>\n\n    <p>Then:<\u002Fp>\n    <div class=\"codeblock\"><pre>I just messed up reflections.md. Use git to get it back to the way it was at the last snapshot.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>See how quickly you can recover.<\u002Fp>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      With git in place, you can be braver. Mistakes are recoverable, so you can experiment more freely.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"20\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-21\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 21<\u002Fspan><h3 class=\"day-title\">Build Something You’ll Actually Use<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>This is the big one. Think of something annoying you do regularly. Examples:<\u002Fp>\n    <ul>\n      <li>Sending the same kind of email over and over → a template generator<\u002Fli>\n      <li>Forgetting what you worked on yesterday → a daily summary tool<\u002Fli>\n      <li>Wasting time finding files → a tool that shows recent activity<\u002Fli>\n      <li>Manually organizing photos by date → an auto-sorter<\u002Fli>\n    <\u002Ful>\n\n    <p>Ask Claude:<\u002Fp>\n    <div class=\"codeblock\"><pre>I have this problem: [describe it]. Help me design a small tool that solves it. Ask me questions about what I want before you start building.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Spend the day building it the way you want it.<\u002Fp>\n\n    <p><strong>Stuck for ideas?<\u002Fstrong> Pick one of these and adapt it:<\u002Fp>\n    <ul>\n      <li>A morning-brief tool that opens your <code class=\"inline\">claude-lab<\u002Fcode> folder, shows what changed yesterday, and creates today’s reflection file ready to write in.<\u002Fli>\n      <li>A “what was I doing?” tool that scans your Documents folder and tells you the five files you’ve touched most recently.<\u002Fli>\n      <li>A meeting-prep tool you point at a folder of past notes — it pulls out anything related to a name or topic you give it.<\u002Fli>\n    <\u002Ful>\n\n    <p>Don’t pick the most ambitious one. Pick the one that solves the most-annoying part of your week.<\u002Fp>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      The most useful tools are the ones you build for yourself, because nobody else has your exact problem.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"21\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-22\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 22<\u002Fspan><h3 class=\"day-title\">Inventory Your Stuff<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <div class=\"codeblock\"><pre>cd ~/claude-lab\nclaude<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"codeblock\"><pre>Look through this whole folder. Make me a cheat sheet that lists every tool we've built, what it does, and exactly how to run it. Save it as my-tools.md.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Use one of your tools today as part of your real day.<\u002Fp>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Tools you forget about aren’t tools. They’re clutter. A cheat sheet keeps them alive.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"22\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<!-- ═════════ PHASE 4 ═════════ -->\n<section class=\"phase\" id=\"phase-4\">\n  <div class=\"phase-num\">Phase Four<\u002Fdiv>\n  <h2 class=\"phase-title\">Making It Yours<\u002Fh2>\n  <p class=\"phase-sub\">Days 23 to 30 · The terminal becomes a place you live, not visit.<\u002Fp>\n  <p class=\"phase-intro\">You’ve come a long way. The remaining days are about smoothing out the rough edges so Claude Code feels natural. Not like a separate thing you do.<\u002Fp>\n<\u002Fsection>\n\n<article class=\"day\" id=\"day-23\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 23<\u002Fspan><h3 class=\"day-title\">Teaching Claude About Your Project<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>Pick a folder you work in often. Maybe for a job, a hobby, or a side project.<\u002Fp>\n\n    <div class=\"codeblock\"><pre>cd [path to that folder]\nclaude<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"codeblock\"><pre>I want to make a CLAUDE.md file for this folder. It should tell future-you (next time I open Claude here) what this project is, how it's organized, what I care about, and any rules you should follow when helping me. Ask me questions, then write the file.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Now every time you open Claude in that folder, it’ll automatically read this file first.<\u002Fp>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      You don’t have to re-explain context every session. CLAUDE.md does it for you.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"23\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-24\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 24<\u002Fspan><h3 class=\"day-title\">Find Your Annoyances<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>For one day, every time something annoys you on your computer, write it down. Something repetitive, something tedious, something that takes too many steps.<\u002Fp>\n\n    <p>End of the day:<\u002Fp>\n    <div class=\"codeblock\"><pre>claude<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n    <div class=\"codeblock\"><pre>Here are five things that annoyed me today: [list]. For each one, could Claude help? What would it look like?<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <p>Pick one. Build a fix.<\u002Fp>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Noticing friction is a skill. Most people don’t notice it because they assume it’s just how things are.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"24\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-25\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 25<\u002Fspan><h3 class=\"day-title\">Working Across Many Files<\u002Fh3><\u002Fheader>\n  <div class=\"day-body\">\n    <p>Find a set of files that belong together. A project, a collection of notes, related documents.<\u002Fp>\n\n    <div class=\"codeblock\"><pre>claude<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"codeblock\"><pre>Look at all the files in [folder]. Find any inconsistencies between them. Are there things that contradict each other? Information missing in some but not others?<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"codeblock\"><pre>Now make one summary document that combines everything I'd need to know from all of these.<\u002Fpre><button class=\"copy-btn\">Copy<\u002Fbutton><\u002Fdiv>\n\n    <div class=\"learned\">\n      <div class=\"learned-label\">What you just learned<\u002Fdiv>\n      Claude can hold many files in its head at once. You don’t have to be the one keeping them straight.\n    <\u002Fdiv>\n    <button class=\"complete-btn\" data-day=\"25\"><span class=\"check\"><\u002Fspan><span class=\"label\">Mark complete<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Farticle>\n\n<article class=\"day\" id=\"day-26\">\n  <header class=\"day-header\"><span class=\"day-label\">Day 26<\u002Fspan><h3 class=\"day-title\">Tell Claude How You Like Things<\u002Fh3><\u002Fheader>\n  <div class=\
